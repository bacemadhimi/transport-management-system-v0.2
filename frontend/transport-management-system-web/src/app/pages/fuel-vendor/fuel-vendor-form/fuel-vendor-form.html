<mat-card class="vendor-form-card">
  <header class="vendor-form-card__header">
    <div>
      <h2>{{ data.vendorId ? 'Modifier Fournisseur' : 'Ajouter Fournisseur' }}</h2>
    </div>
  </header>

  <form [formGroup]="vendorForm" class="vendor-form">
    <div class="form-grid">
      
      <!-- Nom du Fournisseur -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <mat-label>Nom du fournisseur <span class="required-star">*</span></mat-label>
          <mat-form-field appearance="outline" class="full-width vendor-field">
            <input matInput formControlName="name" placeholder="Ex: SHELL" />
            <mat-error *ngIf="vendorForm.get('name')?.hasError('required')">
              Le nom du fournisseur est obligatoire
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <div class="form-footer">
            <button 
              mat-flat-button 
              color="primary" 
              type="submit" 
              [disabled]="vendorForm.invalid"
              (click)="onSubmit()">
              <span>{{ data.vendorId ? 'Modifier' : 'Ajouter' }}</span>
            </button>
            <button mat-button type="button" (click)="onCancel()">Annuler</button>
          </div>
        </div>
      </div>

    </div>
  </form>
</mat-card>
