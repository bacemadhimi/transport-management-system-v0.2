<div class="warehouse-page">

  <div class="filters">
    <mat-form-field appearance="outline">
      <mat-label>Rechercher</mat-label>
      <input matInput placeholder="Référence ou matière" [formControl]="filterControl">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Matière</mat-label>
      <mat-select [formControl]="materialControl">
        <mat-option [value]="null">Toutes</mat-option>
        <mat-option *ngFor="let option of materialOptions" [value]="option.id">
          {{ option.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Statut</mat-label>
      <mat-select [formControl]="statusControl">
        <mat-option [value]="null">Tous</mat-option>
        <mat-option *ngFor="let option of statusOptions" [value]="option.id">
          {{ option.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <mat-card>
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

      <!-- Référence -->
      <ng-container matColumnDef="reference">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Référence</th>
        <td mat-cell *matCellDef="let element">{{ element.reference }}</td>
      </ng-container>

      <!-- Matière -->
      <ng-container matColumnDef="material">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Matière</th>
        <td mat-cell *matCellDef="let element">{{ element.material }}</td>
      </ng-container>

      <!-- Quantité -->
      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Quantité</th>
        <td mat-cell *matCellDef="let element">{{ element.quantity }}</td>
      </ng-container>

      <!-- Zone -->
      <ng-container matColumnDef="zone">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Zone</th>
        <td mat-cell *matCellDef="let element">{{ element.zone }}</td>
      </ng-container>

      <!-- Statut -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Statut</th>
        <td mat-cell *matCellDef="let element">{{ element.status }}</td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="edit(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(element)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSize]="10" showFirstLastButtons></mat-paginator>
  </mat-card>
</div>
