<div class="dayoff-page">
  <div class="dayoff-header">
    
    <h1 class="dayoff-title">{{ t('DAYOFF_MANAGEMENT_TITLE') }}</h1>

    <div class="dayoff-header__actions">
      <div class="dayoff-header__left">
        <mat-form-field appearance="outline" floatLabel="always" class="dayoff-search">
          <input matInput type="text" [formControl]="searchControl" [placeholder]="t('SEARCH_DAYOFF_PLACEHOLDER')" />
        </mat-form-field>

        <div class="filter-row">
          <mat-form-field appearance="outline" class="country-filter">
            <mat-select [formControl]="countryControl" [placeholder]="t('FILTER_BY_COUNTRY')">
              <mat-option [value]="''">{{ t('ALL_COUNTRIES') }}</mat-option>
              <mat-option value="Tunisie">{{ t('TUNISIA') }}</mat-option>
              <mat-option value="France">{{ t('FRANCE') }}</mat-option>
              <mat-option value="Algérie">{{ t('ALGERIA') }}</mat-option>
              <mat-option value="Maroc">{{ t('MOROCCO') }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline" class="year-filter">
            <mat-select [formControl]="yearControl" [placeholder]="t('FILTER_BY_YEAR')">
              <mat-option [value]="null">{{ t('ALL_YEARS') }}</mat-option>
              <mat-option *ngFor="let year of yearOptions" [value]="year">{{ year }}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="export-actions" aria-label="Export actions">
          <button mat-icon-button class="export-btn export-excel" (click)="exportExcel()" title="Export Excel">
            <svg viewBox="0 0 24 24" class="export-icon" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="2" y="3" width="20" height="18" rx="2" fill="#107C10"></rect>
              <text x="12" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">XLS</text>
            </svg>
          </button>

          <button mat-icon-button class="export-btn export-csv" (click)="exportCSV()" title="Export CSV">
            <svg viewBox="0 0 24 24" class="export-icon" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="2" y="3" width="20" height="18" rx="2" fill="#1E90FF"></rect>
              <text x="12" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">CSV</text>
            </svg>
          </button>

          <button mat-icon-button class="export-btn export-pdf" (click)="exportPDF()" title="Export PDF">
            <svg viewBox="0 0 24 24" class="export-icon" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="2" y="3" width="20" height="18" rx="2" fill="#D32F2F"></rect>
              <text x="12" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">PDF</text>
            </svg>
          </button>
        </div>
      </div>

      <div class="dayoff-header__right">
        <button *ngIf="auth.hasPermission('DAYOFF_ADD')" mat-flat-button class="dayoff-add-btn" (click)="add()" type="button">
          {{ t('ADD_DAYOFF') }}
        </button>
      </div>
    </div>
  </div>

  <app-table
    [PagedData]="pagedDayOffData"
    [pageIndex]="filter.pageIndex"
    [pageSize]="filter.pageSize"
    [displayedColumns]="showCols"
    (rowClick)="onRowClick($event)"
    (onPageChange)="pageChange($event)">
  </app-table>
</div>
