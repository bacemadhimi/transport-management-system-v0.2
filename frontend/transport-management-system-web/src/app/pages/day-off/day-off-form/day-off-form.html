<mat-card class="dayoff-form-card">
  <header class="dayoff-form-card__header">
    <div>
      <h2>{{ data.dayOffId ? 'Modifier Jour Férié' : 'Ajouter Jour Férié' }}</h2>
    </div>
  </header>

  <form [formGroup]="dayOffForm" class="dayoff-form">
    <div class="form-grid">
      
      <!-- Nom du jour férié -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <mat-label>Nom du jour férié <span class="required-star">*</span></mat-label>
          <mat-form-field appearance="outline" class="full-width dayoff-field">
            <input matInput formControlName="name" placeholder="Ex: Fête du Travail" />
            <mat-error *ngIf="dayOffForm.get('name')?.hasError('required')">
              Le nom est obligatoire
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <!-- Pays -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <mat-label>Pays <span class="required-star">*</span></mat-label>
          <mat-form-field appearance="outline" class="full-width dayoff-field">
            <input matInput formControlName="country" placeholder="Ex: France, Tunisie, etc." />
            <mat-error *ngIf="dayOffForm.get('country')?.hasError('required')">
              Le pays est obligatoire
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <!-- Date -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <mat-label>Date <span class="required-star">*</span></mat-label>
          <mat-form-field appearance="outline" class="full-width dayoff-field">
            <input matInput [matDatepicker]="picker" formControlName="date" placeholder="JJ/MM/AAAA">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
            <mat-error *ngIf="dayOffForm.get('date')?.hasError('required')">
              La date est obligatoire
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <!-- Description -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <mat-label>Description (optionnelle)</mat-label>
          <mat-form-field appearance="outline" class="full-width dayoff-field">
            <textarea matInput formControlName="description" placeholder="Description du jour férié" rows="3"></textarea>
          </mat-form-field>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <div class="form-footer">
            <button 
              mat-flat-button 
              color="primary" 
              type="submit" 
              [disabled]="dayOffForm.invalid || isSubmitting"
              (click)="onSubmit()">
              <span>{{ data.dayOffId ? 'Enregistrer' : 'Ajouter' }}</span>
            </button>
            <button mat-button type="button" (click)="onCancel()">Annuler</button>
          </div>
        </div>
      </div>

    </div>
  </form>
</mat-card>
