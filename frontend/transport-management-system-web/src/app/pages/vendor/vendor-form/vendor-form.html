<mat-card class="vendor-form-card">
  <header class="vendor-form-card__header">
    <div>
      <h2>{{ data.vendorId ? 'Modifier Vendeur' : 'Ajouter Vendeur' }}</h2>
    </div>
  </header>

  <form [formGroup]="vendorForm" class="vendor-form">
    <div class="form-grid">
      
      <!-- Nom -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <mat-label>Nom du vendeur <span class="required-star">*</span></mat-label>
          <mat-form-field appearance="outline" class="full-width vendor-field">
            <input matInput formControlName="name" placeholder="Ex: Garage Auto Plus" />
            <mat-error *ngIf="vendorForm.get('name')?.hasError('required')">
              Le nom est obligatoire
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <!-- Email -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <mat-label>Email</mat-label>
          <mat-form-field appearance="outline" class="full-width vendor-field">
            <input matInput type="email" formControlName="email" placeholder="Ex: contact@garage.com" />
            <mat-error *ngIf="vendorForm.get('email')?.hasError('email')">
              Veuillez entrer un email valide
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <!-- Téléphone -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <div class="mat-phone-field w-full">
            <div class="mat-phone-wrapper">
              <input
                matInput
                formControlName="phone"
                #phoneInput
                [readonly]="isSubmitting"
              />
            </div>
            <mat-error *ngIf="vendorForm.get('phone')?.invalid && vendorForm.get('phone')?.touched">
              {{ getErrorMessage('phone') }}
            </mat-error>
          </div>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-row full-width">
        <div class="form-field full-width">
          <div class="form-footer">
            <button 
              mat-flat-button 
              color="primary" 
              type="submit" 
              [disabled]="vendorForm.invalid || isSubmitting"
              (click)="onSubmit()">
              <span>{{ data.vendorId ? 'Modifier' : 'Ajouter' }}</span>
            </button>
            <button mat-button type="button" (click)="onCancel()">Annuler</button>
          </div>
        </div>
      </div>

    </div>
  </form>
</mat-card>
